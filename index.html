      return currentFilter === 'all' ? days : days.filter(day => day.theme === currentFilter);

function renderGrid() {
  const visibleDays = getVisibleDays();

  const prepDays = visibleDays.filter(day => day.theme === 'prep');
  const restDays = visibleDays.filter(day => day.theme === 'rest');
  const returnDays = visibleDays.filter(day => day.theme === 'return');

  function renderRow(daysInRow) {
    if (!daysInRow.length) return '';

    return `
      <div class="calendar-row">
      ${daysInRow.map(day => {
        const globalIndex = days.findIndex(item => item.id === day.id);
        const isLocked = globalIndex >= unlockedCount;

        return `
          <article class="day-card ${isLocked ? 'locked' : ''}" data-id="${day.id}" data-locked="${isLocked}">
            <h3>${day.shortTitle}</h3>
            <p class="card-note">${day.cardNote || ''}</p>
            <div class="day-footer">
              <span>${themeLabel(day.theme)}</span>
              <span>${isLocked ? '🔒' : 'Открыть →'}</span>
            </div>
          </article>
        `;
      }).join('')}
      </div>
    `;
  }

  grid.innerHTML = `
    ${renderRow(prepDays)}
    ${renderRow(restDays)}
    ${renderRow(returnDays)}
  `;

  grid.querySelectorAll('.day-card').forEach(card => {
    card.addEventListener('click', () => {
    if (card.dataset.locked === 'true') return;
      const id = card.dataset.id;
      const visible = getVisibleDays();
      const idx = visible.findIndex(item => item.id === id);
      renderDay(visible[idx]);
      currentIndex = idx;
      document.getElementById('day-viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}
    function renderDay(day) {
      intro.innerHTML = day.intro;
      coverTitle.textContent = day.title;

      contentBlocks.innerHTML = '';
      if (day.content) {
        const content = document.createElement('div');
        content.className = 'article-text';
        content.innerHTML = day.content;
        contentBlocks.appendChild(content);
      }
      day.bullets.forEach(block => {

        el.className = 'list-box';
        el.innerHTML = `

          <ul>
            ${block.items.map(item => `<li>${item}</li>`).join('')}
          </ul>
        `;

      });

            <img src="${item.src}" alt="" />
          </a>
        </figure>
      `).join('');
      contentBlocks.appendChild(gallery);
    }

    function themeLabel(theme) {
      return {
        prep: 'Подготовка',
        rest: 'Праздники',
        return: 'Возвращение'
      }[theme] || theme;
    }

    function setFilter(filter) {
      currentFilter = filter;
      chips.forEach(chip => chip.classList.toggle('active', chip.dataset.filter === filter));
      navLinks.forEach(link => link.classList.toggle('active', link.dataset.filter === filter));
      renderGrid();
      const firstDay = getVisibleDays()[0];
      if (firstDay) {
        currentIndex = 0;
        renderDay(firstDay);
      }
    }

    chips.forEach(chip => {
      chip.addEventListener('click', () => setFilter(chip.dataset.filter));
    });

    navLinks.forEach(link => {
      link.addEventListener('click', () => setFilter(link.dataset.filter));
    });

    nextDayButton.addEventListener('click', () => {
      const visible = getVisibleDays().filter(day => {
        const globalIndex = days.findIndex(item => item.id === day.id);
        return globalIndex < unlockedCount;
      });

      if (!visible.length) return;

      currentIndex = (currentIndex + 1) % visible.length;
      renderDay(visible[currentIndex]);
      document.getElementById('day-viewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    renderGrid();

  </script>
